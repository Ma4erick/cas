apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "cas.fullname" . }}
  labels:
    {{- include "cas.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "cas.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "cas.selectorLabels" . | nindent 8 }}
      annotations:
        {{- toYaml .Values.podAnnotations | nindent 8 }}
    spec:
      {{- if .Values.serviceAccount.create }}
      serviceAccountName: {{ .Values.serviceAccount.name }}
      {{- end }}
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532    # nonroot user from Chainguard static image
        runAsGroup: 65532
        fsGroup: 65532
      containers:
        - name: cas
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: 8080
              protocol: TCP
          env:
            - name: PORT
              value: {{ .Values.config.port | quote }}
            - name: CAS_BASE_URL
              value: {{ .Values.config.casBaseUrl | quote }}
            - name: CAS_MODEL
              value: {{ .Values.config.casModel | quote }}
            - name: ATLASSIAN_DOMAIN
              value: {{ .Values.config.atlassianDomain | quote }}
            - name: SHOW_TOKEN_FIELDS
              value: {{ .Values.config.showTokenFields | quote }}
            - name: CAS_PROJECTS_DIR
              value: {{ .Values.persistence.mountPath | quote }}
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.name }}
                  key: database-url
            - name: CAS_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.name }}
                  key: cas-secret
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.name }}
                  key: redis-url
            - name: GITHUB_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.name }}
                  key: github-client-id
                  optional: true
            - name: GITHUB_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.name }}
                  key: github-client-secret
                  optional: true
            - name: ATLASSIAN_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.name }}
                  key: atlassian-client-id
                  optional: true
            - name: ATLASSIAN_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.name }}
                  key: atlassian-client-secret
                  optional: true
          {{- if .Values.persistence.enabled }}
          volumeMounts:
            - name: projects
              mountPath: {{ .Values.persistence.mountPath }}
          {{- end }}
          livenessProbe:
            {{- toYaml .Values.livenessProbe | nindent 12 }}
          readinessProbe:
            {{- toYaml .Values.readinessProbe | nindent 12 }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      {{- if .Values.persistence.enabled }}
      volumes:
        - name: projects
          persistentVolumeClaim:
            claimName: {{ include "cas.fullname" . }}-projects
      {{- end }}
      nodeSelector:
        {{- toYaml .Values.nodeSelector | nindent 8 }}
      tolerations:
        {{- toYaml .Values.tolerations | nindent 8 }}
      affinity:
        {{- toYaml .Values.affinity | nindent 8 }}
