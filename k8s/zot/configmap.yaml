apiVersion: v1
kind: ConfigMap
metadata:
  name: zot-config
  namespace: zot
data:
  config.json: |
    {
      "distSpecVersion": "1.1.0",
      "storage": {
        "rootDirectory": "/var/lib/registry"
      },
      "http": {
        "address": "0.0.0.0",
        "port": "5000"
      },
      "log": {
        "level": "info"
      },
      "extensions": {
        "sync": {
          "enable": true,
          "registries": [
            {
              "urls": ["https://cgr.dev"],
              "onDemand": true,
              "tlsVerify": true,
              "content": [{ "prefix": "/chainguard/**" }]
            },
            {
              "urls": ["https://ghcr.io"],
              "onDemand": true,
              "tlsVerify": true,
              "content": [{ "prefix": "/**" }]
            }
          ]
        },
        "search": {
          "enable": true
        }
      }
    }
