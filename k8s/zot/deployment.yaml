apiVersion: v1
kind: Namespace
metadata:
  name: zot
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: zot
  namespace: zot
  labels:
    app: zot
spec:
  replicas: 1
  selector:
    matchLabels:
      app: zot
  template:
    metadata:
      labels:
        app: zot
    spec:
      containers:
        - name: zot
          image: ghcr.io/project-zot/zot-linux-arm64:latest
          args: ["serve", "/etc/zot/config.json"]
          ports:
            - containerPort: 5000
              name: registry
          volumeMounts:
            - name: config
              mountPath: /etc/zot
              readOnly: true
            - name: storage
              mountPath: /var/lib/registry
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /v2/
              port: 5000
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /v2/
              port: 5000
            initialDelaySeconds: 5
            periodSeconds: 10
      volumes:
        - name: config
          configMap:
            name: zot-config
        - name: storage
          emptyDir: {}        # Use PVC in production
