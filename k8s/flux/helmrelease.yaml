apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: cas
  namespace: cas
spec:
  interval: 5m                          # Reconcile every 5 minutes

  chart:
    spec:
      chart: cas
      version: ">=0.0.0"               # Always use the latest pushed chart version
      sourceRef:
        kind: HelmRepository
        name: cas-charts
        namespace: flux-system
      interval: 1m                     # Check for new chart versions every minute

  # Override values for this environment
  values:
    image:
      repository: 10.43.12.86:5000/cas
      tag: latest
      pullPolicy: Always               # Always pull so new image pushes take effect

    replicaCount: 1

    config:
      casBaseUrl: "http://localhost:8080"
      casModel: "claude-sonnet-4-6"
      atlassianDomain: "outsystemsrd.atlassian.net"
      showTokenFields: "false"

    ingress:
      enabled: false                   # Enable when you have an ingress controller

    persistence:
      enabled: true
      storageClass: local-path        # Built-in k3d/k3s provisioner
      size: 10Gi
      accessMode: ReadWriteOnce       # Single pod for local dev (use ReadWriteMany for multi-pod)
      mountPath: /projects

    # Point to your K8s secret for sensitive config
    secrets:
      name: cas-secrets

  # Upgrade behaviour
  upgrade:
    remediation:
      retries: 3
  install:
    remediation:
      retries: 3
